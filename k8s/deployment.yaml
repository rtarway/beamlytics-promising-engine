apiVersion: apps/v1
kind: Deployment
metadata:
  name: promising-engine
  labels:
    app: promising-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: promising-engine
  template:
    metadata:
      labels:
        app: promising-engine
    spec:
      containers:
      - name: promising-engine
        image: promising-engine:latest
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: LOG_LEVEL
          value: "info"
        - name: NODE_ENV
          value: "production"
        - name: INVENTORY_SERVICE_URL
          value: "http://unified-inventory:3000"
        - name: RATE_SHOPPER_SERVICE_URL
          value: "http://rate-shopper:80"
        - name: RETENTION_SERVICE_URL
          value: "http://retention-service:80"
        - name: JSON_BODY_LIMIT
          value: "1mb"
        - name: RATE_LIMIT_MAX
          value: "300"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: promising-engine-service
spec:
  selector:
    app: promising-engine
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
